services:
  - type: web
    name: shaw-enterprise
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: MYSQL_SYNC_ENABLED
        value: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: EMAIL_PROVIDER
        sync: false
